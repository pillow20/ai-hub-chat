name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main  # <-- Если твоя ветка называется master, поменяй здесь на master

# ЭТОТ БЛОК КРИТИЧЕСКИ ВАЖЕН: он дает права на запись в репозиторий и исправляет ошибку 128
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        # ВАЖНО: Замени 'ai-hub-chat' на ТОЧНОЕ имя твоего репозитория (маленькими буквами)!
        # Например, если репозиторий называется my-bot, пиши --base-href="/my-bot/"
        run: flutter build web --release --base-href="/ai-hub-chat/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
